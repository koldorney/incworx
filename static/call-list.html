let sortCol='priority',sortDir='asc';
const priorityOrder={high:0,medium:1,low:2};

function init(){
  const firms=[...new Set(CONTACTS.map(c=>c.firm))].sort();
  const sel=document.getElementById('firmFilter');
  firms.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;sel.appendChild(o)});
  document.getElementById('countTotal').textContent=CONTACTS.length;
  document.getElementById('search').addEventListener('input',render);
  document.getElementById('firmFilter').addEventListener('change',render);
  document.getElementById('deptFilter').addEventListener('change',render);
  document.getElementById('priorityFilter').addEventListener('change',render);
  document.querySelectorAll('th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
      const col=th.dataset.col;
      if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';
      else{sortCol=col;sortDir='asc'}
      render();
    });
  });
  render();
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const firm=document.getElementById('firmFilter').value;
  const dept=document.getElementById('deptFilter').value;
  const pri=document.getElementById('priorityFilter').value;
  let filtered=CONTACTS.filter(c=>{
    if(firm&&c.firm!==firm)return false;
    if(dept&&c.dept!==dept)return false;
    if(pri&&c.priority!==pri)return false;
    if(q){
      const s=(c.name+' '+c.firm+' '+c.position+' '+c.email+' '+c.dept).toLowerCase();
      if(!s.includes(q))return false;
    }
    return true;
  });
  filtered.sort((a,b)=>{
    let va,vb;
    if(sortCol==='priority'){va=priorityOrder[a.priority];vb=priorityOrder[b.priority]}
    else if(sortCol==='confidence'){va=a.confidence;vb=b.confidence}
    else if(sortCol==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase()}
    else if(sortCol==='firm'){va=a.firm.toLowerCase();vb=b.firm.toLowerCase()}
    else if(sortCol==='position'){va=a.position.toLowerCase();vb=b.position.toLowerCase()}
    else if(sortCol==='dept'){va=a.dept;vb=b.dept}
    else if(sortCol==='email'){va=a.email;vb=b.email}
    else if(sortCol==='phone'){va=a.phone;vb=b.phone}
    else{va=a.name;vb=b.name}
    if(va<vb)return sortDir==='asc'?-1:1;
    if(va>vb)return sortDir==='asc'?1:-1;
    return 0;
  });
  return filtered;
}

function render(){
  const filtered=getFiltered();
  document.getElementById('countShown').textContent=filtered.length;
  document.querySelectorAll('th[data-col]').forEach(th=>{
    th.classList.remove('sorted-asc','sorted-desc');
    if(th.dataset.col===sortCol)th.classList.add(sortDir==='asc'?'sorted-asc':'sorted-desc');
  });
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=filtered.map((c,i)=>{
    const deptClass=(['it','executive','operations','finance','management'].includes(c.dept))?'dept-'+c.dept:'dept-other';
    const confClass=c.confidence>=95?'conf-high':c.confidence>=85?'conf-med':'conf-low';
    const priClass='priority-'+c.priority;
    return `<tr class="${priClass}">
      <td>${i+1}</td>
      <td class="name">${c.name}</td>
      <td><span class="firm-tag">${c.firm}</span></td>
      <td class="position">${c.position}</td>
      <td><span class="dept ${deptClass}">${c.dept}</span></td>
      <td class="email"><a href="mailto:${c.email}">${c.email}</a></td>
      <td class="phone">${c.phone||'—'}</td>
      <td class="confidence ${confClass}">${c.confidence}%</td>
      <td class="linkedin">${c.linkedin?`<a href="${c.linkedin}" target="_blank">Profile</a>`:''}</td>
      <td class="actions"><button class="copy-btn" onclick="copyRow('${c.email}')">Copy</button></td>
    </tr>`;
  }).join('');
}

function copyRow(email){
  navigator.clipboard.writeText(email);
}

function copyAllEmails(){
  const emails=CONTACTS.map(c=>c.email).join('\\n');
  navigator.clipboard.writeText(emails);
  alert('Copied '+CONTACTS.length+' emails to clipboard');
}

function copyFiltered(){
  const filtered=getFiltered();
  const emails=filtered.map(c=>c.email).join('\\n');
  navigator.clipboard.writeText(emails);
  alert('Copied '+filtered.length+' emails to clipboard');
}

function exportCSV(){
  const header='Name,First,Last,Firm,Position,Department,Email,Phone,LinkedIn,Confidence,Priority';
  const rows=CONTACTS.map(c=>
    [c.name,c.first,c.last,c.firm,'"'+c.position+'"',c.dept,c.email,c.phone,c.linkedin,c.confidence,c.priority].join(',')
  );
  const csv=header+'\\n'+rows.join('\\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='incworx-pe-call-list.csv';a.click();
  URL.revokeObjectURL(url);
}

init();
